{% extends 'profile_base.html' %}

{% block content %}
<div class="profile-page-container">
    <header class="profile-header">
        <h1>Change Password</h1>
    </header>

    <div class="form-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-grid">
                {% for field in form %}
                    <p>
                        {{ field.label_tag }}
                        {{ field }}
                        {% if field.help_text %}
                            <small style="color: #6a6e73;">{{ field.help_text }}</small>
                        {% endif %}
                        {% for error in field.errors %}
                            <span style="color: #ff4757; font-size: 0.8rem;">{{ error }}</span>
                        {% endfor %}
                    </p>
                {% endfor %}
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-save">Update Password</button>
                <a href="{% url 'profile' %}" class="btn-cancel">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
