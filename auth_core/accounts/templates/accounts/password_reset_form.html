{% extends 'auth_base.html' %}
{% block content %}
    <div class="auth-header">
        <h2>Reset Password</h2>
        <p>Enter your email and we'll send a secure link.</p>
    </div>
    <form method="POST" class="auth-form">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-primary"><span>Send Reset Link</span></button>
    </form>
{% endblock %}
