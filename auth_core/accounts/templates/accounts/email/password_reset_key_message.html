<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
</head>
<body style="background-color: #0b0f19; font-family: sans-serif; margin: 0; padding: 40px; color: #f3f4f6;">
    <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" style="max-width: 600px; background: #1e293b; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 32px;">
        <tr>
            <td align="center" style="padding-bottom: 24px;">
                <h1 style="color: #38bdf8; margin: 0; font-size: 28px;">NEXUS IDENTITY</h1>
            </td>
        </tr>
        <tr>
            <td style="padding-bottom: 24px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 24px;">
                <p style="font-size: 16px; line-height: 1.6;">Hello,</p>
                <p style="font-size: 16px; line-height: 1.6;">You receive this email because a password reset was requested for your account.</p>
            </td>
        </tr>
        <tr>
            <td align="center" style="padding-bottom: 32px;">
                <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}" style="background: #38bdf8; color: #ffffff; text-decoration: none; padding: 14px 32px; font-weight: 600; border-radius: 8px; display: inline-block;">Reset Password</a>
            </td>
        </tr>
        <tr>
            <td style="border-top: 1px solid rgba(255,255,255,0.1); padding-top: 24px;">
                <p style="font-size: 12px; color: #94a3b8;">If the button doesn't work, click the link below:</p>
                <p style="font-size: 12px;"><a href="{{ activate_url }}" style="color: #38bdf8;">{{ activate_url }}</a></p>
            </td>
        </tr>
    </table>
</body>
</html>
