<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus | 500 System Anomaly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Reusing the same glass-card styles but with a red accent */
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 0, 0, 0.2); border-radius: 20px; padding: 60px; text-align: center; max-width: 500px; }
        h1 { font-size: 6rem; margin: 0; color: #ff4757; }
        h2 { font-weight: 300; letter-spacing: 2px; margin-bottom: 20px; }
        p { opacity: 0.7; line-height: 1.6; margin-bottom: 30px; }
        .btn-home { background: transparent; color: #ffffff; border: 1px solid #ff4757; padding: 12px 30px; border-radius: 30px; text-decoration: none; transition: 0.3s; font-size: 0.8rem; }
        .btn-home:hover { background: #ff4757; color: #ffffff; }
    </style>
</head>
<body>
    <div class="glass-card">
        <i class="fas fa-microchip" style="font-size: 3rem; color: #ff4757; margin-bottom: 20px;"></i>
        <h1>500</h1>
        <h2>System Anomaly</h2>
        <p>A critical failure occurred in the Nexus engine. Our architects have been alerted to the breach. Please try a hard reboot.</p>
        <a href="{% url 'home' %}" class="btn-home">Emergency Reboot</a>
    </div>
</body>
</html>
